<nav class="app-nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="brand-pre">2026 FIFA World Cup</span>
      <span class="brand-main">Bracket Challenge</span>
    </div>

    <div class="nav-right">
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Bracket</a>
        <a routerLink="/ranking" routerLinkActive="active">Ranking</a>
      </div>

      @if (isBracketPage()) {
        <div class="nav-actions">
          <button class="btn btn-reset" (click)="onReset()" title="Reset all picks">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            <span class="btn-label">Reset</span>
          </button>
          <button
            class="btn btn-export"
            [ngClass]="{ 'btn-pulse': bracketService.isComplete(), 'btn-loading': bridge.isExporting() }"
            (click)="onExport()"
            [disabled]="bridge.isExporting()"
          >
            @if (bridge.isExporting()) {
              <span class="spinner"></span>
              <span class="btn-label">Exporting…</span>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span class="btn-label">Export</span>
            }
          </button>
        </div>
      }
    </div>
  </div>
</nav>
