<div class="review-bracket">
  <div class="review-legend">
    <span class="legend-pill legend-correct">✓ Correct</span>
    <span class="legend-pill legend-wrong">✗ Wrong</span>
    <span class="legend-pill legend-pending">— Pending</span>
  </div>

  <div class="review-radial-wrap">
    <app-radial-bracket [review]="review()" [size]="480" />
  </div>
</div>
