<div class="scoring-legend">
  <div class="legend-header">
    <svg class="legend-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <span class="legend-title">Points per correct pick</span>
  </div>
  <div class="legend-items">
    @for (item of scoringRounds; track item.round) {
      <div class="legend-item" [attr.data-round]="item.round">
        <span class="round-label">{{ item.label }}</span>
        <span class="points-badge">{{ item.points }}pt{{ item.points > 1 ? 's' : '' }}</span>
      </div>
    }
  </div>
</div>
